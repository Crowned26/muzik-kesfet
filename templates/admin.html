<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Müzik Keşfet</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="app">
    <h1>Admin Panel</h1>
    <p>Bu sayfa site şifresi olmadan açılır. Sadece admin şifresi gerekir.</p>
    <div id="admin-gate">
      <input type="password" id="admin-pass" class="search-input" placeholder="Admin şifresi" autofocus>
      <button type="button" id="admin-login-btn" class="btn primary">Admin Girişi</button>
      <p id="admin-err" class="admin-err hidden"></p>
    </div>
    <div id="admin-content" class="hidden">
      <div class="panel side-panel" style="margin-top:16px">
        <h3>Son Ziyaretler <span id="visit-count" style="opacity:.6;font-weight:normal"></span></h3>
        <div id="a-visits"><p class="visit-meta">—</p></div>
      </div>
      <div class="panel side-panel" style="margin-top:16px">
        <h3>Kullanıcı Önerileri</h3>
        <ul id="a-suggestions" class="list"></ul>
      </div>
      <div class="panel side-panel" style="margin-top:16px">
        <h3>Video Bildirimleri</h3>
        <ul id="a-reports" class="list"></ul>
      </div>
      <button type="button" id="admin-logout-btn" class="btn ghost">Admin Çıkış</button>
    </div>
    <p style="margin-top:16px"><a href="/">← Ana sayfa</a></p>
  </div>
  <script>
    function esc(s) {
      return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
    function fmtTime(ts) {
      if (!ts) return "—";
      return new Date(ts * 1000).toLocaleString("tr-TR");
    }
    function showGate(show) {
      document.getElementById("admin-gate").classList.toggle("hidden", !show);
      document.getElementById("admin-content").classList.toggle("hidden", show);
    }
    function renderVisits(visits) {
      const el = document.getElementById("a-visits");
      document.getElementById("visit-count").textContent = visits.length ? "(" + visits.length + ")" : "";
      if (!visits.length) {
        el.innerHTML = "<p class=\"visit-meta\">Henüz ziyaret kaydı yok.</p>";
        return;
      }
      const rows = visits.map(function (v) {
        const ua = v.ua || {};
        const geo = v.geo || {};
        const c = v.client || {};
        const loc = [geo.city, geo.regionName, geo.country].filter(Boolean).join(", ") || "—";
        const badges = ["<span class=\"visit-badge\">" + esc(v.event) + "</span>"];
        if (ua.device) badges.push("<span class=\"visit-badge\">" + esc(ua.device) + "</span>");
        if (c.standalone) badges.push("<span class=\"visit-badge\">PWA</span>");
        if (geo.proxy) badges.push("<span class=\"visit-badge warn\">Proxy/VPN</span>");
        const meta = [c.screen, c.lang, c.timezone, geo.isp].filter(Boolean).map(esc).join(" · ");
        return "<tr><td>" + esc(fmtTime(v.at)) + "<div class=\"visit-meta\">" + badges.join("") + "</div></td>" +
          "<td>" + esc(v.ip) + "<div class=\"visit-meta\">" + esc(loc) + "</div></td>" +
          "<td>" + esc(ua.browser || "?") + " / " + esc(ua.os || "?") + "</td>" +
          "<td><div class=\"visit-meta\">" + (meta || "—") + "</div></td></tr>";
      }).join("");
      el.innerHTML = "<table class=\"visit-table\"><thead><tr><th>Zaman</th><th>IP / Konum</th><th>Cihaz</th><th>Detay</th></tr></thead><tbody>" + rows + "</tbody></table>";
    }
    async function loadAdmin() {
      const [sRes, rRes, vRes] = await Promise.all([
        fetch("/api/admin/suggestions", { credentials: "same-origin" }),
        fetch("/api/admin/reports", { credentials: "same-origin" }),
        fetch("/api/admin/visits", { credentials: "same-origin" }),
      ]);
      if (!sRes.ok || !rRes.ok || !vRes.ok) throw new Error("auth");
      const suggestions = await sRes.json();
      const reports = await rRes.json();
      const visits = await vRes.json();
      renderVisits(visits);
      document.getElementById("a-suggestions").innerHTML = suggestions.length
        ? suggestions.map(s => "<li>" + esc(s.artist) + " — " + esc(s.title) + "</li>").join("")
        : "<li>Henüz öneri yok.</li>";
      document.getElementById("a-reports").innerHTML = reports.length
        ? reports.map(r => "<li>" + esc(r.artist) + " — " + esc(r.title) + " (" + esc(r.youtube_id) + ")</li>").join("")
        : "<li>Henüz bildirim yok.</li>";
      showGate(false);
    }
    async function tryLogin() {
      const err = document.getElementById("admin-err");
      err.classList.add("hidden");
      const r = await fetch("/api/admin/unlock", {
        method: "POST",
        credentials: "same-origin",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: document.getElementById("admin-pass").value })
      });
      if (!r.ok) {
        err.textContent = "Yanlış admin şifresi";
        err.classList.remove("hidden");
        return;
      }
      loadAdmin().catch(function () {
        err.textContent = "Yüklenemedi";
        err.classList.remove("hidden");
      });
    }
    document.getElementById("admin-login-btn").addEventListener("click", tryLogin);
    document.getElementById("admin-pass").addEventListener("keydown", function (e) {
      if (e.key === "Enter") tryLogin();
    });
    document.getElementById("admin-logout-btn").addEventListener("click", function () {
      fetch("/api/admin/logout", { method: "POST", credentials: "same-origin" }).then(function () {
        showGate(true);
        document.getElementById("admin-pass").value = "";
      });
    });
    fetch("/api/admin/status", { credentials: "same-origin" }).then(function (r) { return r.json(); }).then(function (d) {
      if (d.ok) loadAdmin();
    });
  </script>
</body>
</html>
