services:
  - type: web
    name: muzik-kesfet
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: APP_PASSWORD
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "true"
